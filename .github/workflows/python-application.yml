name: python-application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código fuente
    - name: Descargar codigo fuente
      uses: actions/checkout@v4

    # 2. Configurar el entorno de Python
    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Instalar dependencias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Ejecutar pruebas automatizadas
    - name: Ejecutar pruebas automatizadas (pytest)
      run: |
        pytest

    # 5. Ejecutar la aplicación
    - name: Ejecutar la aplicacion
      run: |
        python app.py

    # 6. Simular una fase de despliegue
    - name: Simular fase de despliegue
      run: |
        echo "Iniciando despliegue simulado..."
        echo "Aplicacion desplegada exitosamente en el entorno de pruebas."

    # 7. Autenticarse en GitHub Container Registry (GHCR)
    - name: Autenticarse en GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

# 8. Construir y Publicar la imagen Docker
    - name: Construir y Publicar imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/20anthony/ejercicio:3.0.0

# 9. Levantar y probar la imagen publicada
    - name: Levantar la imagen Docker publicada
      run: |
        docker pull ghcr.io/20anthony/ejercicio:3.0.0
        docker run --rm ghcr.io/20anthony/ejercicio:3.0.0